<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mocked UI Tests</title>
    <style>
        .test-pass { color: green; }
        .test-fail { color: red; }
    </style>
</head>
<body>
    <h1>UI Regression Tests</h1>
    <div id="results">Running tests...</div>

    <!-- MOCK UI CONTAINER -->
    <div id="app-container" style="border: 1px solid #ccc; padding: 10px; margin-top: 20px;">
        <div id="connection-status">Disconnected</div>
        <button id="connect-btn">Connect</button>
        
        <div id="settings-panel" style="display:none;">
            <input type="text" id="api-key" placeholder="API Key">
            <button id="save-btn">Save</button>
            <div id="save-status"></div>
        </div>
        
        <div id="error-msg" style="color: red; display: none;"></div>
    </div>

    <!-- MOCK UI LOGIC (Minimal implementation to testing against) -->
    <script>
        // Simulating the extension UI logic here for the 'mock' tests
        document.getElementById('connect-btn').addEventListener('click', () => {
            document.getElementById('connection-status').textContent = 'Connected';
            document.getElementById('connect-btn').disabled = true;
        });

        document.getElementById('save-btn').addEventListener('click', () => {
            const key = document.getElementById('api-key').value;
            chrome.storage.local.set({ apiKey: key }, () => {
                document.getElementById('save-status').textContent = 'Saved!';
            });
        });

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.style.display = 'block';
        }
    </script>
    
    <script>
        // MOCK CHROME API
        window.chrome = {
            storage: {
                local: {
                    _data: { apiKey: 'mock-key' },
                    get: (keys, cb) => cb(window.chrome.storage.local._data),
                    set: (items, cb) => {
                        Object.assign(window.chrome.storage.local._data, items);
                        if (cb) cb();
                    }
                }
            },
            runtime: {
                sendMessage: (msg) => console.log('Mock message:', msg)
            }
        };

        // TEST RUNNER LOGIC
        const resultsDiv = document.getElementById('results');
        const tests = [];

        function test(name, fn) {
            tests.push({ name, fn });
        }

        async function runTests() {
            let passed = 0;
            let failed = 0;
            let html = '<ul>';

            for (const t of tests) {
                try {
                    // Reset UI State between tests
                    document.getElementById('connection-status').textContent = 'Disconnected';
                    document.getElementById('connect-btn').disabled = false;
                    document.getElementById('error-msg').style.display = 'none';

                    await t.fn();
                    html += `<li class="test-pass">✓ ${t.name}</li>`;
                    passed++;
                } catch (e) {
                    html += `<li class="test-fail">✗ ${t.name}: ${e.message}</li>`;
                    failed++;
                    console.error(e);
                }
            }
            html += '</ul>';
            html += `<p><strong>Passed: ${passed}, Failed: ${failed}</strong></p>`;
            resultsDiv.innerHTML = html;
            
            window.__TEST_RESULTS__ = { passed, failed, total: tests.length };
        }

        // --- TESTS ---

        test('Popup renders connect button', () => {
            // Verifies the initial state of the Popup UI.
            // Checks if the 'Connect' button is present and labelled correctly.
            const btn = document.getElementById('connect-btn');
            if (!btn) throw new Error('Connect button not visible');
            if (btn.textContent !== 'Connect') throw new Error('Wrong button text');
        });

        test('Clicking connect updates status', () => {
            // Simulates the user flow of connecting to the agent.
            // 1. Click button
            // 2. Button should become disabled (prevent double click)
            // 3. Status text should change to 'Connected'
            const btn = document.getElementById('connect-btn');
            btn.click();
            const status = document.getElementById('connection-status').textContent;
            if (status !== 'Connected') throw new Error(`Status was ${status}, expected Connected`);
            if (!btn.disabled) throw new Error('Button should be disabled after connect');
        });

        test('Settings persistence (Save Flow)', async () => {
            // Verifies that Settings can be saved to Chrome storage.
            // This is an Async test using a Promise.
            return new Promise((resolve, reject) => {
                // 1. Enter new API Key
                const input = document.getElementById('api-key');
                input.value = 'new-api-key-123';
                
                // 2. Click Save
                const saveBtn = document.getElementById('save-btn');
                saveBtn.click();
                
                // 3. Wait for async storage operation
                setTimeout(() => {
                    const status = document.getElementById('save-status').textContent;
                    // Check UI feedback
                    if (status !== 'Saved!') reject(new Error('Save status not shown'));
                    
                    // Check Mock Storage for correct data
                    chrome.storage.local.get(null, (data) => {
                        if (data.apiKey === 'new-api-key-123') resolve();
                        else reject(new Error(`Storage not updated: ${JSON.stringify(data)}`));
                    });
                }, 10);
            });
        });

        test('Error state rendering', () => {
            // Verifies that the UI correctly displays error messages.
            // Checks if the error container becomes visible and has correct text.
            showError('Network Error');
            const el = document.getElementById('error-msg');
            if (el.style.display === 'none') throw new Error('Error div hidden');
            if (el.textContent !== 'Network Error') throw new Error('Wrong error text');
        });

        // AUTO RUN
        setTimeout(runTests, 100);
    </script>
</body>
</html>
