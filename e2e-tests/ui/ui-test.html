<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mocked Side Panel Tests</title>
    <style>
        /* Basic styling to mimic panel.css for testing logic */
        .xwebagent-message { padding: 5px; margin: 5px; border-radius: 4px; }
        .xwebagent-message.user { background-color: #e3f2fd; text-align: right; }
        .xwebagent-message.agent { background-color: #f5f5f5; }
        .test-pass { color: green; font-family: monospace; }
        .test-fail { color: red; font-family: monospace; }
        #results { margin-bottom: 20px; padding: 10px; background: #eee; }
    </style>
</head>
<body>
    <h1>Side Panel UI Tests</h1>
    <div id="results">Running tests...</div>

    <!-- MOCK UI CONTAINER (Structure matches sidepanel/panel.html) -->
    <div id="app-container" style="border: 1px solid #ccc; padding: 10px; width: 300px;">
        
        <!-- Header -->
        <div class="xwebagent-chat-header">
             <h2>XWebAgent</h2>
             <button id="xwebagent-settings" title="Settings">⚙️</button>
        </div>

        <!-- Messages Area -->
        <div id="xwebagent-messages" style="height: 200px; overflow-y: auto; border: 1px solid #ddd; margin-bottom: 10px;">
            <!-- Messages go here -->
        </div>

        <!-- Input Area -->
        <div class="xwebagent-chat-input-area">
             <div class="xwebagent-quick-actions">
                <button class="xwebagent-quick-btn" data-action="reset">🧹 Clear</button>
             </div>
             
             <div style="display: flex; gap: 5px;">
                 <input type="text" id="xwebagent-input" placeholder="Ask anything...">
                 <button id="xwebagent-send">➤</button>
             </div>
        </div>
        
        <!-- Hidden/Overlay Elements -->
        <div id="error-msg" style="color: red; display: none;"></div>
        <div id="loading-indicator" style="display: none;">Thinking...</div>
    </div>

    <!-- MOCK UI LOGIC (Simplified panel.js) -->
    <script>
        const input = document.getElementById('xwebagent-input');
        const sendBtn = document.getElementById('xwebagent-send');
        const messagesDiv = document.getElementById('xwebagent-messages');
        const resetBtn = document.querySelector('[data-action="reset"]');
        
        // Helper to add message
        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `xwebagent-message ${sender}`;
            div.textContent = text;
            messagesDiv.appendChild(div);
            return div;
        }

        // Send Logic
        async function handleSend() {
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';

            // Simulate API Call
            document.getElementById('loading-indicator').style.display = 'block';
            
            try {
                // Mock simple echo response or command processing
                const response = await mockExtensionApi(text);
                addMessage(response, 'agent');
            } catch (err) {
                document.getElementById('error-msg').textContent = err.message;
                document.getElementById('error-msg').style.display = 'block';
            } finally {
                document.getElementById('loading-indicator').style.display = 'none';
            }
        }

        // Event Listeners
        sendBtn.addEventListener('click', handleSend);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        resetBtn.addEventListener('click', () => {
            messagesDiv.innerHTML = '';
            document.getElementById('error-msg').style.display = 'none';
        });

        // Mock API function (replaces actual LLM call)
        async function mockExtensionApi(text) {
            return new Promise((resolve) => {
                setTimeout(() => {
                    if (text === 'error_test') throw new Error('Simulated API Failure');
                    resolve(`Echo: ${text}`);
                }, 50);
            });
        }
    </script>
    
    <!-- TEST RUNNER -->
    <script>
        const resultsDiv = document.getElementById('results');
        const tests = [];

        function test(name, fn) { tests.push({ name, fn }); }

        async function runTests() {
            let passed = 0;
            let failed = 0;
            let html = '<ul>';

            for (const t of tests) {
                try {
                    // TEARDOWN / SETUP
                    document.getElementById('xwebagent-messages').innerHTML = '';
                    document.getElementById('xwebagent-input').value = '';
                    document.getElementById('error-msg').style.display = 'none';
                    
                    await t.fn();
                    html += `<li class="test-pass">✓ ${t.name}</li>`;
                    passed++;
                } catch (e) {
                    html += `<li class="test-fail">✗ ${t.name}: ${e.message}</li>`;
                    failed++;
                    console.error(e);
                }
            }
            html += '</ul>';
            html += `<p><strong>Passed: ${passed}, Failed: ${failed}</strong></p>`;
            resultsDiv.innerHTML = html;
            window.__TEST_RESULTS__ = { passed, failed, total: tests.length };
        }

        // --- TEST CASES ---

        test('UI Input and Send Button exist', () => {
            if (!document.getElementById('xwebagent-input')) throw new Error('Input missing');
            if (!document.getElementById('xwebagent-send')) throw new Error('Send button missing');
        });

        test('Sending a message updates UI', async () => {
            const input = document.getElementById('xwebagent-input');
            const sendBtn = document.getElementById('xwebagent-send');
            const msgs = document.getElementById('xwebagent-messages');

            input.value = 'Hello World';
            sendBtn.click();

            // Check immediate user message
            const userMsg = msgs.querySelector('.xwebagent-message.user');
            if (!userMsg || userMsg.textContent !== 'Hello World') {
                throw new Error('User message not displayed correctly');
            }

            // Wait for agent response
            await new Promise(r => setTimeout(r, 100));
            const agentMsg = msgs.querySelector('.xwebagent-message.agent');
            if (!agentMsg || !agentMsg.textContent.includes('Echo: Hello World')) {
                throw new Error('Agent response missing or incorrect');
            }
        });

        test('Clear button empties chat', () => {
            const msgs = document.getElementById('xwebagent-messages');
            // Manually add junk
            msgs.innerHTML = '<div>Junk</div>';
            
            const clearBtn = document.querySelector('[data-action="reset"]');
            clearBtn.click();

            if (msgs.children.length !== 0) throw new Error('Chat not cleared');
        });

        test('Error handling displays message', async () => {
            const input = document.getElementById('xwebagent-input');
            const sendBtn = document.getElementById('xwebagent-send');
            
            // Trigger mocked error
            input.value = 'error_test';
            sendBtn.click();

            await new Promise(r => setTimeout(r, 100));
            
            const errDiv = document.getElementById('error-msg');
            if (errDiv.style.display === 'none') throw new Error('Error div hidden');
            if (errDiv.textContent !== 'Simulated API Failure') throw new Error('Wrong error text');
        });

        setTimeout(runTests, 100);
    </script>
</body>
</html>
