<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>XWebAgent Settings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0d0d1a 0%, #1a1a2e 100%);
      color: #e8e8e8;
      min-height: 100vh;
      padding: 40px;
    }
    
    .container {
      max-width: 500px;
      margin: 0 auto;
    }
    
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .logo {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      margin-bottom: 16px;
    }
    
    header h1 {
      font-size: 28px;
      background: linear-gradient(135deg, #00d9ff, #00ff88);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    header p {
      color: #888;
      margin-top: 8px;
      font-size: 14px;
    }
    
    .section {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }
    
    .section h2 {
      font-size: 16px;
      color: #00d9ff;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group:last-child {
      margin-bottom: 0;
    }
    
    .form-group label {
      display: block;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 8px;
    }
    
    .form-group input[type="text"],
    .form-group input[type="password"],
    .form-group select {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      transition: all 0.2s;
    }
    
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #00d9ff;
      box-shadow: 0 0 20px rgba(0, 217, 255, 0.1);
    }
    
    .form-group small {
      display: block;
      color: #666;
      margin-top: 8px;
      font-size: 12px;
    }
    
    .form-group small a {
      color: #00d9ff;
      text-decoration: none;
    }
    
    .form-group small a:hover {
      text-decoration: underline;
    }
    
    .btn-row {
      display: flex;
      gap: 12px;
    }
    
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    button.primary {
      flex: 1;
      background: linear-gradient(135deg, #00d9ff, #00ff88);
      color: #000;
    }
    
    button.primary:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 20px rgba(0, 217, 255, 0.3);
    }
    
    button.secondary {
      background: rgba(255,255,255,0.1);
      color: #aaa;
    }
    
    button.secondary:hover {
      background: rgba(0, 217, 255, 0.2);
      color: #00d9ff;
    }
    
    .status {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 10px;
      text-align: center;
      font-size: 14px;
      display: none;
    }
    
    .status.success {
      display: block;
      background: rgba(0, 255, 136, 0.1);
      color: #00ff88;
      border: 1px solid rgba(0, 255, 136, 0.2);
    }
    
    .status.error {
      display: block;
      background: rgba(255, 100, 100, 0.1);
      color: #ff6666;
      border: 1px solid rgba(255, 100, 100, 0.2);
    }
    
    .version {
      text-align: center;
      color: #444;
      font-size: 12px;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <img src="../icons/icon128.png" alt="XWebAgent" class="logo">
      <h1>XWebAgent</h1>
      <p>AI Web Assistant - Makes browsing Safe, Fun, and Efficient</p>
    </header>
    
    <div class="section">
      <h2>🔑 API Configuration</h2>
      <div class="form-group">
        <label for="apiKey">Google Gemini API Key</label>
        <input type="password" id="apiKey" placeholder="Enter your API key...">
        <small>Get a free key at <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a></small>
      </div>
      <div class="form-group">
        <label for="model">AI Model</label>
        <select id="model">
          <option value="gemini-2.0-flash-exp">Gemini 2.0 Flash (Latest)</option>
        </select>
      </div>
      <div class="btn-row">
        <button type="button" id="testApiBtn" class="secondary">🧪 Test Connection</button>
      </div>
      <div id="testResult" class="status"></div>
    </div>
    
    <button class="primary" id="saveBtn" style="width: 100%;">💾 Save Settings</button>
    <div class="status" id="status"></div>
    
    <p class="version">XWebAgent v1.0.0</p>
  </div>
  
  <script src="options.js"></script>
</body>
</html>
