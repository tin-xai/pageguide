<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>XWebAgent Settings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0d0d1a 0%, #1a1a2e 100%);
      color: #e8e8e8;
      min-height: 100vh;
      padding: 40px;
    }
    
    .container {
      max-width: 540px;
      margin: 0 auto;
    }
    
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .logo {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      margin-bottom: 16px;
    }
    
    header h1 {
      font-size: 28px;
      background: linear-gradient(135deg, #00d9ff, #00ff88);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    header p {
      color: #888;
      margin-top: 8px;
      font-size: 14px;
    }
    
    .section {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }
    
    .section h2 {
      font-size: 16px;
      color: #00d9ff;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group:last-child {
      margin-bottom: 0;
    }
    
    .form-group label {
      display: block;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 8px;
    }
    
    .form-group input[type="text"],
    .form-group input[type="password"],
    .form-group select {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      transition: all 0.2s;
    }
    
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #00d9ff;
      box-shadow: 0 0 20px rgba(0, 217, 255, 0.1);
    }
    
    .form-group small {
      display: block;
      color: #666;
      margin-top: 8px;
      font-size: 12px;
    }
    
    .form-group small a {
      color: #00d9ff;
      text-decoration: none;
    }
    
    .form-group small a:hover {
      text-decoration: underline;
    }
    
    /* Provider selector tabs */
    .provider-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    
    .provider-tab {
      flex: 1;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #888;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    
    .provider-tab:hover {
      background: rgba(255,255,255,0.08);
      color: #aaa;
    }
    
    .provider-tab.active {
      background: linear-gradient(135deg, rgba(0,217,255,0.2), rgba(0,255,136,0.2));
      border-color: #00d9ff;
      color: #00d9ff;
    }
    
    .provider-tab .icon {
      display: block;
      font-size: 20px;
      margin-bottom: 4px;
    }
    
    /* Provider config sections */
    .provider-config {
      display: none;
    }
    
    .provider-config.active {
      display: block;
    }
    
    .btn-row {
      display: flex;
      gap: 12px;
    }
    
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    button.primary {
      flex: 1;
      background: linear-gradient(135deg, #00d9ff, #00ff88);
      color: #000;
    }
    
    button.primary:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 20px rgba(0, 217, 255, 0.3);
    }
    
    button.secondary {
      background: rgba(255,255,255,0.1);
      color: #aaa;
    }
    
    button.secondary:hover {
      background: rgba(0, 217, 255, 0.2);
      color: #00d9ff;
    }
    
    .status {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 10px;
      text-align: center;
      font-size: 14px;
      display: none;
    }
    
    .status.success {
      display: block;
      background: rgba(0, 255, 136, 0.1);
      color: #00ff88;
      border: 1px solid rgba(0, 255, 136, 0.2);
    }
    
    .status.error {
      display: block;
      background: rgba(255, 100, 100, 0.1);
      color: #ff6666;
      border: 1px solid rgba(255, 100, 100, 0.2);
    }
    
    .status.info {
      display: block;
      background: rgba(255,255,255,0.05);
      color: #aaa;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .version {
      text-align: center;
      color: #444;
      font-size: 12px;
      margin-top: 24px;
    }

    .current-provider {
      text-align: center;
      padding: 8px 16px;
      background: rgba(0,217,255,0.1);
      border-radius: 8px;
      font-size: 12px;
      color: #00d9ff;
      margin-bottom: 16px;
    }
    .icon img {
      width: 22px;
      height: 22px;
      vertical-align: middle;
}

  </style>
</head>
<body>
  <div class="container">
    <header>
      <img src="../icons/icon128.png" alt="XWebAgent" class="logo">
      <h1>XWebAgent</h1>
      <p>AI Web Assistant - Makes browsing Safe, Fun, and Efficient</p>
    </header>
    
    <div class="section">
      <h2>🤖 LLM Provider</h2>
      <div id="currentProvider" class="current-provider">Current: Gemini</div>
      
      <div class="provider-tabs">
        <div class="provider-tab active" data-provider="gemini">
          <span class="icon">
            <img src="https://commons.wikimedia.org/wiki/Special:FilePath/Google%20Gemini%20icon%202025.svg" alt="Gemini" width="128" height="128">
          </span>
          Gemini
        </div>
        <div class="provider-tab" data-provider="openrouter">
          <img src="https://openrouter.ai/favicon.ico" alt="OpenRouter">
          OpenRouter
        </div>
        <div class="provider-tab" data-provider="openai">
          <img src="https://upload.wikimedia.org/wikipedia/commons/4/4d/OpenAI_Logo.svg" alt="OpenAI">
          OpenAI
        </div>
      </div>
      
      <!-- Gemini Config -->
      <div class="provider-config active" id="config-gemini">
        <div class="form-group">
          <label for="geminiApiKey">Gemini API Key</label>
          <input type="password" id="geminiApiKey" placeholder="Enter your Gemini API key...">
          <small>Get a free key at <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a></small>
        </div>
        <div class="form-group">
          <label for="geminiModel">Model</label>
          <select id="geminiModel">
            <option value="gemini-2.0-flash-exp">Gemini 2.0 Flash</option>
            <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
            <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
            <option value="gemini-3-flash-preview">Gemini 3.0 Flash</option>
            <option value="gemini-3-pro-preview">Gemini 3.0 Pro</option>
          </select>
        </div>
      </div>
      
      <!-- OpenRouter Config -->
      <div class="provider-config" id="config-openrouter">
        <div class="form-group">
          <label for="openrouterApiKey">OpenRouter API Key</label>
          <input type="password" id="openrouterApiKey" placeholder="Enter your OpenRouter API key...">
          <small>Get a key at <a href="https://openrouter.ai/keys" target="_blank">openrouter.ai/keys</a></small>
        </div>
        <div class="form-group">
          <label for="openrouterModel">Model</label>
          <select id="openrouterModel">
            <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
            <option value="anthropic/claude-3-haiku">Claude 3 Haiku (Fast)</option>
            <option value="openai/gpt-4o">GPT-4o</option>
            <option value="openai/gpt-4o-mini">GPT-4o Mini (Fast)</option>
            <option value="google/gemini-2.5-flash">Gemini 2.5 Flash</option>
            <option value="meta-llama/llama-3.1-70b-instruct">Llama 3.1 70B</option>
          </select>
        </div>
      </div>
      
      <!-- OpenAI Config -->
      <div class="provider-config" id="config-openai">
        <div class="form-group">
          <label for="openaiApiKey">OpenAI API Key</label>
          <input type="password" id="openaiApiKey" placeholder="Enter your OpenAI API key...">
          <small>Get a key at <a href="https://platform.openai.com/api-keys" target="_blank">platform.openai.com/api-keys</a></small>
        </div>
        <div class="form-group">
          <label for="openaiModel">Model</label>
          <select id="openaiModel">
            <option value="gpt-4o">GPT-4o (Best)</option>
            <option value="gpt-4o-mini">GPT-4o Mini (Fast)</option>
            <option value="gpt-4-turbo">GPT-4 Turbo</option>
            <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
          </select>
        </div>
      </div>
      
      <div class="btn-row">
        <button type="button" id="testApiBtn" class="secondary">🧪 Test Connection</button>
      </div>
      <div id="testResult" class="status"></div>
    </div>
    
    <button class="primary" id="saveBtn" style="width: 100%;">💾 Save Settings</button>
    <div class="status" id="status"></div>
    
    <p class="version">XWebAgent v1.0.0</p>
  </div>
  
  <script src="options.js"></script>
</body>
</html>
