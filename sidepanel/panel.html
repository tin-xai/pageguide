<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XWebAgent</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div class="xwebagent-panel">

    <!-- User Study: mini bar shown during extension-condition tasks (chat stays usable) -->
    <div class="study-mini-bar" id="study-mini-bar" style="display:none;"></div>

    <!-- User Study overlay (covers whole panel when visible) -->
    <div class="study-overlay" id="study-overlay" style="display:none;"></div>

    <!-- History overlay (covers whole panel when visible) -->
    <div class="xwebagent-history-overlay" id="xwebagent-history" style="display:none;">
      <div class="xwebagent-history-hdr">
        <button class="xwebagent-history-nav-btn" id="xwebagent-history-back" style="visibility:hidden;">← Back</button>
        <span class="xwebagent-history-hdr-title" id="xwebagent-history-hdr-title">Chat History</span>
        <button class="xwebagent-history-nav-btn" id="xwebagent-history-close">✕</button>
      </div>
      <div class="xwebagent-history-body" id="xwebagent-history-body"></div>
    </div>

    <div class="xwebagent-chat-header">
      <div class="xwebagent-header-left">
        <!-- <img src="../icons/icon128.png" alt="XWebAgent" class="xwebagent-logo"> -->
        <div class="xwebagent-header-text">
          <!-- <h2>XWebAgent</h2> -->
        </div>
      </div>
      <div class="xwebagent-header-right">
        <button class="xwebagent-theme-btn" id="xwebagent-theme-toggle" title="Toggle light/dark mode">🌙</button>
        <button class="xwebagent-new-chat-btn" id="xwebagent-open-history" title="Chat History">🕐</button>
        <button class="xwebagent-new-chat-btn" id="xwebagent-new-chat" title="New Chat">✏️</button>
        <button class="xwebagent-settings-btn" id="xwebagent-settings" title="Settings">⚙️</button>
        <button class="xwebagent-new-chat-btn" id="study-header-btn" title="User Study">📋</button>
      </div>
    </div>
    
    <div class="xwebagent-chat-messages" id="xwebagent-messages">
    </div>
    
    <div class="xwebagent-chat-input-area">
      <div class="xwebagent-quick-actions">
        <button class="xwebagent-quick-btn" data-action="reset" title="Clear chat and highlights">🧹 Clear</button>
        <button class="xwebagent-quick-btn" id="xwebagent-save-chat" title="Save current chat to history">💾 Save</button>
        <button class="xwebagent-quick-btn xwebagent-pdf-reader-btn" id="xwebagent-pdf-reader" title="Open PDF Reader with AI chat">📄 PDF</button>
        <button class="xwebagent-quick-btn" id="xwebagent-no-page-ctx" title="Toggle: answer from AI knowledge only (ignore current page)">🌐 Page: On</button>
      </div>
      
      <!-- Image Preview Area (hidden by default) -->
      <div class="xwebagent-image-preview" id="xwebagent-image-preview" style="display: none;">
        <div class="xwebagent-image-wrapper" id="xwebagent-image-wrapper">
          <img id="xwebagent-preview-img" src="" alt="Uploaded image">
          <!-- clickable region overlays injected here by JS -->
        </div>
        <div class="xwebagent-image-preview-footer">
          <span class="xwebagent-image-label" id="xwebagent-image-label">📷 Image ready - ask about it!</span>
          <button class="xwebagent-remove-image" id="xwebagent-remove-image" title="Remove image">✕</button>
        </div>
      </div>
      
      <!-- Slash command autocomplete dropdown -->
      <div class="xwebagent-slash-menu" id="xwebagent-slash-menu" style="display:none;"></div>

      <!-- File Preview Area (hidden by default) -->
      <div class="xwebagent-file-preview" id="xwebagent-file-preview" style="display: none;">
        <span class="xwebagent-file-label" id="xwebagent-file-label">📎 File attached</span>
        <button class="xwebagent-remove-image" id="xwebagent-remove-file" title="Remove file">✕</button>
      </div>

      <!-- Selected Text Preview Area (hidden by default) -->
      <div class="xwebagent-selected-text-preview" id="xwebagent-selected-text-preview" style="display: none;">
        <span class="xwebagent-selected-text-label" id="xwebagent-selected-text-label">📝 Text selected</span>
        <button class="xwebagent-remove-image" id="xwebagent-remove-selected-text" title="Clear selection context">✕</button>
      </div>

      <div class="xwebagent-input-row">
        <textarea class="xwebagent-chat-input" id="xwebagent-input" placeholder="Ask anything... (type / for commands)" rows="3"></textarea>
      </div>
      <div class="xwebagent-input-actions">
        <label class="xwebagent-upload-btn" id="xwebagent-upload-label" title="Upload image or file (or Ctrl+V to paste image)">
          <span id="xwebagent-upload-icon">📎</span>
          <input type="file" id="xwebagent-image-upload" accept="image/*,.txt,.md,.csv,.json,.xml,.yaml,.yml,.html,.htm,.py,.js,.ts,.css,.log" hidden>
        </label>
        <button class="xwebagent-send-btn" id="xwebagent-send">➤</button>
      </div>
    </div>
  </div>
  <script src="../content/prompts.js"></script>
  <script src="panel.js"></script>
  <script src="supabase_config.js"></script>
  <script src="study.js"></script>
</body>
</html>
